!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2-Nivel2
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet0/0.60
 encapsulation dot1Q 60
 ip address 192.168.50.17 255.255.255.248
!
interface FastEthernet0/0.70
 encapsulation dot1Q 70
 ip address 192.168.50.25 255.255.255.248
!
interface FastEthernet0/0.80
 encapsulation dot1Q 80
 ip address 192.168.50.49 255.255.255.248
!
interface FastEthernet0/0.90
 encapsulation dot1Q 90
 ip address 192.168.50.57 255.255.255.248
!
interface FastEthernet0/0.100
 encapsulation dot1Q 100
 ip address 192.168.50.89 255.255.255.252
!
interface FastEthernet0/0.110
 encapsulation dot1Q 110
 ip address 192.168.50.109 255.255.255.252
!
interface FastEthernet0/1
 ip address 192.168.50.102 255.255.255.252
 duplex auto
 speed auto
!
interface FastEthernet1/0
 ip address 192.168.50.105 255.255.255.252
 duplex auto
 speed auto
!
router ospf 1
 log-adjacency-changes
 network 192.168.50.0 0.0.0.255 area 0
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
