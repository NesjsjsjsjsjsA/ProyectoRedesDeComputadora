!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3-Nivel3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet0/0.120
 encapsulation dot1Q 120
 ip address 192.168.50.33 255.255.255.248
!
interface FastEthernet0/0.130
 encapsulation dot1Q 130
 ip address 192.168.50.65 255.255.255.248
!
interface FastEthernet0/0.140
 encapsulation dot1Q 140
 ip address 192.168.50.73 255.255.255.248
!
interface FastEthernet0/0.150
 encapsulation dot1Q 150
 ip address 192.168.50.93 255.255.255.252
!
interface FastEthernet0/0.160
 encapsulation dot1Q 160
 ip address 192.168.50.97 255.255.255.252
!
interface FastEthernet0/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
